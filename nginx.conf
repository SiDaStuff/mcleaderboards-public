# MC Leaderboards - Nginx Configuration (behind Cloudflare)
# Place this file in /etc/nginx/sites-available/mcleaderboards
# Then symlink: sudo ln -s /etc/nginx/sites-available/mcleaderboards /etc/nginx/sites-enabled/

# ----- Cloudflare real-IP restoration -----
# Cloudflare IPv4 ranges (https://www.cloudflare.com/ips-v4/)
set_real_ip_from 173.245.48.0/20;
set_real_ip_from 103.21.244.0/22;
set_real_ip_from 103.22.200.0/22;
set_real_ip_from 103.31.4.0/22;
set_real_ip_from 141.101.64.0/18;
set_real_ip_from 108.162.192.0/18;
set_real_ip_from 190.93.240.0/20;
set_real_ip_from 188.114.96.0/20;
set_real_ip_from 197.234.240.0/22;
set_real_ip_from 198.41.128.0/17;
set_real_ip_from 162.158.0.0/15;
set_real_ip_from 104.16.0.0/13;
set_real_ip_from 104.24.0.0/14;
set_real_ip_from 172.64.0.0/13;
set_real_ip_from 131.0.72.0/22;

# Cloudflare IPv6 ranges (https://www.cloudflare.com/ips-v6/)
set_real_ip_from 2400:cb00::/32;
set_real_ip_from 2606:4700::/32;
set_real_ip_from 2803:f800::/32;
set_real_ip_from 2405:b500::/32;
set_real_ip_from 2405:8100::/32;
set_real_ip_from 2a06:98c0::/29;
set_real_ip_from 2c0f:f248::/32;

# Use CF-Connecting-IP for the real visitor IP
real_ip_header CF-Connecting-IP;

# ----- HTTP: redirect everything to HTTPS -----
server {
    listen 80;
    listen [::]:80;
    server_name mcleaderboards.org www.mcleaderboards.org;

    return 301 https://mcleaderboards.org$request_uri;
}

# ----- www → apex redirect (HTTPS) -----
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.mcleaderboards.org;

    # Let's Encrypt certificate
    ssl_certificate     /etc/letsencrypt/live/mcleaderboards.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/mcleaderboards.org/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;

    return 301 https://mcleaderboards.org$request_uri;
}

# ----- Main HTTPS server -----
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name mcleaderboards.org;

    # Let's Encrypt certificate
    ssl_certificate     /etc/letsencrypt/live/mcleaderboards.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/mcleaderboards.org/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # Frontend files
    root /home/ubuntu/mcleaderboards;
    index index.html;

    # ----- SECURITY: Block sensitive files and directories -----
    # Deny ALL dotfiles (.env, .git, .htaccess, etc.)
    location ~ /\. {
        deny all;
        return 404;
    }

    # Deny backend directory entirely
    location ^~ /backend {
        deny all;
        return 404;
    }

    # Deny sensitive config/rule files at root
    location ~* ^/(firebase-rules\.json|firestore\.rules|server\.js|package\.json|package-lock\.json|ecosystem\.config\.js|\.env|nginx\.conf) {
        deny all;
        return 404;
    }

    # Deny node_modules if present
    location ^~ /node_modules {
        deny all;
        return 404;
    }

    # ----- Static files -----
    location / {
        try_files $uri $uri/ /index.html;

        # Images & fonts — long immutable cache; Cloudflare will cache these on edge
        location ~* \.(jpg|jpeg|png|gif|ico|svg|webp|woff2?|ttf|eot)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
            add_header X-Content-Type-Options "nosniff" always;
        }

        # JS & CSS — short TTL so deploys propagate quickly through CF
        location ~* \.(js|css)$ {
            expires 1h;
            add_header Cache-Control "public, must-revalidate";
            add_header X-Content-Type-Options "nosniff" always;
            etag on;
        }

        # HTML — never cache on CF edge (always revalidate)
        location ~* \.html$ {
            add_header Cache-Control "no-cache";
            add_header X-Content-Type-Options "nosniff" always;
        }
    }

    # ----- SSE stream proxy (long-lived connections) -----
    location ~ ^/api/match/.+/stream$ {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Connection '';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_cache off;
        chunked_transfer_encoding off;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        add_header Cache-Control "no-store, no-cache" always;
        add_header CDN-Cache-Control "no-store" always;
    }

    # ----- API proxy to Node.js backend -----
    location /api {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;

        # Pass the real visitor IP (restored from CF-Connecting-IP above)
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # Tell Cloudflare not to cache API responses
        add_header Cache-Control "no-store, no-cache" always;
        add_header CDN-Cache-Control "no-store" always;

        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # ----- Security headers -----
    # (Cloudflare adds some of these; set them at origin for defense-in-depth)
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

    # ----- Gzip (for requests that bypass CF or CF-to-origin) -----
    gzip on;
    gzip_vary on;
    gzip_min_length 256;
    gzip_comp_level 5;
    gzip_proxied any;
    gzip_types text/plain text/css text/xml text/javascript application/json application/javascript application/xml+rss application/atom+xml image/svg+xml;
}

